<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Tasks</title>
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.jpg" type="image/jpeg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand"><span class="brand-mark">&#9889;</span><span>TaskOS</span></div>

      <div class="tabs">
        <button id="boardToggle" class="tab on" type="button">Categories</button>
        <button id="calendarToggle" class="tab" type="button">Calendar</button>
      </div>

      <div class="topbar-spacer"></div>

      <button id="notifyBtn" class="notif-btn" type="button">
        <span class="dot"></span>
        <span>Reminders</span>
      </button>
    </header>

    <div class="dashboard">
      <aside class="sidebar">
        <div class="slabel">Broad Heads</div>
        <div id="broadHeadSummaryList" class="head-summary"></div>
        <button id="sidebarAddHeadBtn" class="add-btn secondary-add" type="button">+ Add broad head</button>

        <div class="slabel">Categories</div>
        <div id="categorySummaryList" class="category-summary"></div>

        <div class="slabel progress-label">Progress</div>
        <div class="prog">
          <div class="prog-top">
            <span class="prog-label">Done</span>
            <span class="prog-num" id="progressCount">0/0</span>
          </div>
          <div class="prog-track">
            <div class="prog-fill" id="progressBarFill" style="width:0%"></div>
          </div>
        </div>

        <button id="sidebarAddTaskBtn" class="add-btn" type="button">+ Add task</button>
      </aside>

      <main class="board-area">
        <section id="boardView" class="view"></section>

        <section id="calendarView" class="view hidden">
          <div class="calendar-shell">
            <div class="cal-nav">
              <button id="prevMonthBtn" class="cal-nav-btn" type="button">&#8592;</button>
              <h2 id="calendarMonthLabel"></h2>
              <button id="todayBtn" class="cal-nav-btn" type="button">Today</button>
              <button id="nextMonthBtn" class="cal-nav-btn" type="button">&#8594;</button>
            </div>

            <div class="cal-hrow">
              <div class="cal-dname">SUN</div>
              <div class="cal-dname">MON</div>
              <div class="cal-dname">TUE</div>
              <div class="cal-dname">WED</div>
              <div class="cal-dname">THU</div>
              <div class="cal-dname">FRI</div>
              <div class="cal-dname">SAT</div>
            </div>

            <div class="cal-grid" id="calendarGrid"></div>
          </div>

          <div class="agenda-shell">
            <div class="agenda-head">
              <h2 id="agendaTitle">Selected day</h2>
            </div>
            <div id="agendaList" class="agenda-list"></div>
          </div>
        </section>
      </main>
    </div>

    <div class="hidden-ui" aria-hidden="true">
      <input id="profileNameInput" type="text" value="Operator">
      <button id="saveSettingsBtn" type="button">Save</button>
      <button id="syncBtn" type="button">Sync</button>
      <span id="connectionDot"></span>
      <p id="connectionStatus"></p>
      <p id="notificationStatus"></p>
    </div>
  </div>

  <div id="taskModalWrap" class="modal-wrap">
    <div class="modal">
      <div class="modal-head">
        <h3 id="formTitle">Add Task</h3>
        <button id="clearFormBtn" class="mcancel" type="button">Cancel</button>
      </div>

      <form id="taskForm" class="task-form">
        <input id="taskIdInput" type="hidden">

        <div class="mfield">
          <label for="taskTitleInput">Subtask</label>
          <input id="taskTitleInput" type="text" maxlength="120" placeholder="What needs to be done next?" required>
        </div>

        <div class="mfield">
          <label for="taskBroadHeadInput">Broad head</label>
          <select id="taskBroadHeadInput"></select>
        </div>

        <div class="mfield">
          <label for="taskCategoryInput">Category</label>
          <select id="taskCategoryInput"></select>
        </div>

        <div class="mfield">
          <label for="taskDueInput">Due date</label>
          <input id="taskDueInput" type="datetime-local" required>
        </div>

        <div class="mfield">
          <label for="taskNotesInput">Notes</label>
          <textarea id="taskNotesInput" rows="3" placeholder="Optional details"></textarea>
        </div>

        <div class="mactions">
          <button id="deleteTaskBtn" class="mcancel hidden" type="button">Delete</button>
          <button id="saveTaskBtn" class="mbtn" type="submit">Save task</button>
        </div>
      </form>
    </div>
  </div>

  <div id="headModalWrap" class="modal-wrap">
    <div class="modal">
      <div class="modal-head">
        <h3 id="headFormTitle">Add Broad Head</h3>
        <button id="clearHeadFormBtn" class="mcancel" type="button">Cancel</button>
      </div>

      <form id="headForm" class="task-form">
        <input id="broadHeadIdInput" type="hidden">

        <div class="mfield">
          <label for="broadHeadTitleInput">Broad head</label>
          <input id="broadHeadTitleInput" type="text" maxlength="120" placeholder="Curriculum Design" required>
        </div>

        <div class="mfield">
          <label for="broadHeadNotesInput">Notes</label>
          <textarea id="broadHeadNotesInput" rows="3" placeholder="Optional context for this head"></textarea>
        </div>

        <div class="mactions">
          <button id="deleteBroadHeadBtn" class="mcancel hidden" type="button">Delete</button>
          <button id="saveBroadHeadBtn" class="mbtn" type="submit">Save broad head</button>
        </div>
      </form>
    </div>
  </div>

  <div id="statusToast" class="status-toast hidden" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
